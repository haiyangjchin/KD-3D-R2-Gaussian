# Knowledge Distillation Configuration - λ_tv=0.05 - Quick Test
# Reduced iterations for quick validation

# Data path parameters
source_path: ./data/real_dataset/cone_ntrain_25_angle_360/pine
model_path: ./test_distill_tv0.05_quick
data_device: cuda
ply_path: ''
scale_min: 0.0005
scale_max: 0.5
eval: true

# Training iteration parameters - Reduced for quick test
iterations: 100
test_iterations:
  - 100
save_iterations:
  - 100
checkpoint_iterations: []
quiet: false
detect_anomaly: false

# Position learning rate parameters
position_lr_init: 0.0002
position_lr_final: 2.0e-05
position_lr_max_steps: 30000

# Density learning rate parameters
density_lr_init: 0.01
density_lr_final: 0.001
density_lr_max_steps: 30000

# Scaling learning rate parameters
scaling_lr_init: 0.005
scaling_lr_final: 0.0005
scaling_lr_max_steps: 30000

# Rotation learning rate parameters
rotation_lr_init: 0.001
rotation_lr_final: 0.0001
rotation_lr_max_steps: 30000

# Loss function weights
lambda_dssim: 0.25
lambda_tv: 0.05  # Same as original R²-Gaussian baseline
tv_vol_size: 32

# Density control parameters
density_min_threshold: 1.0e-05
densification_interval: 100
densify_from_iter: 500
densify_until_iter: 15000
densify_grad_threshold: 5.0e-05
densify_scale_threshold: 0.1

# Other control parameters
max_screen_size: null
max_scale: null
max_num_gaussians: 500000
compute_cov3D_python: false
debug: false

# Knowledge distillation parameters
cnn_model: ./cnn_teacher_50epoch_v4/checkpoints/checkpoint_epoch_034.pth
no_distill: false
no_improvements: false
use_importance_sampling: true
enhanced_regularization: true